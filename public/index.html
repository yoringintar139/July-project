<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>직업 환경 추천자</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Outfit:wght@500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <main class="container app-shell">
      <section class="panel intro" id="introSection">
        <p class="eyebrow">July Project MVP</p>
        <h1>직업 환경 추천자</h1>
        <div class="activity-choice-block">
          <h3>직업 활동 타입 선택</h3>
          <div class="activity-choice-grid">
            <button type="button" id="choiceActive" class="activity-choice-card" aria-pressed="false">
              <strong>활동적인 직업</strong>
              <span>운동 관련/현장 중심 직업 추천</span>
            </button>
            <button type="button" id="choiceDesk" class="activity-choice-card selected" aria-pressed="true">
              <strong>활동적이지 않은 직업</strong>
              <span>생각/머리 중심 직업 추천</span>
            </button>
          </div>
        </div>
        <p class="lead">
          20문항 진단과 원하는 근무 조건을 결합해, 당신에게 맞는 업무 환경과 추천 직무 TOP 5를 보여드립니다.
        </p>
        <button id="startBtn" class="btn-primary">진단 시작하기</button>
      </section>

      <section class="panel hidden" id="surveySection" aria-live="polite">
        <div class="panel-header">
          <h2>성향 진단 (20문항)</h2>
          <div class="progress-wrap">
            <div id="progressBar" class="progress-bar"></div>
          </div>
        </div>
        <form id="surveyForm"></form>
      </section>

      <section class="panel hidden" id="resultSection">
        <h2>결과 리포트</h2>
        <p id="profileSummary" class="profile-summary"></p>

        <div class="selected-env" id="selectedEnv"></div>

        <div class="score-grid" id="scoreGrid"></div>

        <h3 id="recommendationTitle">추천 직무 TOP 5</h3>
        <div id="recommendationList" class="card-list"></div>

        <div class="more-jobs-wrap">
          <button type="button" id="toggleMoreJobsBtn" class="btn-secondary">다른 직업 자세히 보기</button>
          <section id="moreJobsSection" class="hidden" aria-live="polite">
            <h3 id="moreJobsTitle">TOP 5 외 추천 직업</h3>
            <p class="more-jobs-help">상위 추천에 들지 않았지만, 현재 성향과 환경 선택에 맞는 직업들입니다.</p>
            <div id="moreJobsList" class="card-list compact"></div>
          </section>
        </div>

        <h3>피해야 할 환경</h3>
        <ul id="avoidList" class="avoid-list"></ul>

        <button id="retryBtn" class="btn-secondary">다시 진단하기</button>
      </section>
    </main>

    <template id="questionTemplate">
      <div class="question-card">
        <p class="question-text"></p>
        <div class="likert"></div>
      </div>
    </template>

    <script src="/app.js"></script>
  </body>
</html>
